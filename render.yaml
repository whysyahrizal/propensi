databases:
  - name: siragadb
    plan: free
    databaseName: siraga_db
    user: siraga_user

services:
  - type: web
    plan: free
    name: siraga
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'gunicorn --bind 0.0.0.0:$PORT config.asgi:application -k uvicorn.workers.UvicornWorker' 
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: siragadb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "4"
