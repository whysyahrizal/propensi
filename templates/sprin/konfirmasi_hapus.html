{% extends 'base.html' %}
{% block title %}Hapus Sprin — SIRAGA{% endblock %}
{% block page_title %}Konfirmasi Hapus Sprin{% endblock %}
{% block content %}
<div class="flex flex-col gap-6 max-w-lg">
  <a href="{% url 'sprin:detail_sprin' sprin.pk %}" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-900 font-medium">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>Kembali
  </a>
  <div class="rounded-2xl bg-white border border-red-200 shadow-sm overflow-hidden">
    <div class="h-1 bg-red-500"></div>
    <div class="px-8 py-7">
      <h1 class="text-lg font-bold text-gray-900 mb-1">Hapus Sprin "{{ sprin.nomor }}"?</h1>
      <p class="text-sm text-gray-500 mb-6">{{ sprin.perihal }}</p>
      <div class="flex items-center justify-end gap-3">
        <a href="{% url 'sprin:detail_sprin' sprin.pk %}" class="px-5 py-2.5 rounded-xl border border-gray-300 text-sm font-semibold text-gray-700 hover:bg-gray-50">Batal</a>
        <form method="POST"><{% csrf_token %}<button type="submit" class="px-5 py-2.5 rounded-xl bg-red-600 text-white text-sm font-bold hover:bg-red-700">Ya, Hapus</button></form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
