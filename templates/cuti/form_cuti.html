{% extends 'base.html' %}
{% block title %}Ajukan Cuti — SIRAGA{% endblock %}
{% block page_title %}Ajukan Cuti{% endblock %}
{% block content %}
<div class="flex flex-col gap-6 max-w-xl">
  <a href="{% url 'cuti:daftar' %}" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-900 font-medium">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>Kembali
  </a>
  <div class="card overflow-hidden">
    <div class="h-1 bg-[#1a3a6b]"></div>
    <div class="px-8 py-7">
      <h1 class="text-lg font-bold text-gray-900 mb-6">Formulir Pengajuan Cuti</h1>
      <form method="POST" enctype="multipart/form-data" class="flex flex-col gap-5">
        {% csrf_token %}
        <div class="flex flex-col gap-1.5">
          <label class="text-[11px] font-semibold text-gray-500 uppercase tracking-widest">Jenis Cuti <span class="text-red-500">*</span></label>
          <select name="jenis_cuti" required class="h-10 px-3 rounded-lg border border-gray-300 bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-[#1a3a6b]">
            <option value="">Pilih Jenis Cuti</option>
            {% for val, label in jenis_choices %}
            <option value="{{ val }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div class="flex flex-col gap-1.5">
            <label class="text-[11px] font-semibold text-gray-500 uppercase tracking-widest">Tanggal Mulai <span class="text-red-500">*</span></label>
            <input name="tanggal_mulai" type="date" required class="h-10 px-3 rounded-lg border border-gray-300 bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-[#1a3a6b]"/>
          </div>
          <div class="flex flex-col gap-1.5">
            <label class="text-[11px] font-semibold text-gray-500 uppercase tracking-widest">Tanggal Selesai <span class="text-red-500">*</span></label>
            <input name="tanggal_selesai" type="date" required class="h-10 px-3 rounded-lg border border-gray-300 bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-[#1a3a6b]"/>
          </div>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-[11px] font-semibold text-gray-500 uppercase tracking-widest">Alasan <span class="text-red-500">*</span></label>
          <textarea name="alasan" required rows="4" placeholder="Jelaskan alasan pengajuan cuti..." class="w-full px-3 py-2.5 rounded-lg border border-gray-300 bg-gray-50 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-[#1a3a6b]"></textarea>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-[11px] font-semibold text-gray-500 uppercase tracking-widest">Dokumen Pendukung</label>
          <input name="dokumen_pendukung" type="file" accept=".pdf,.jpg,.jpeg,.png" class="text-sm text-gray-600"/>
          <p class="text-[11px] text-gray-400">Format: PDF / JPG / PNG. Maks 5MB.</p>
        </div>
        <div class="flex items-center justify-end gap-3 pt-2 border-t border-gray-100">
          <a href="{% url 'cuti:daftar' %}" class="px-5 py-2.5 rounded-xl border border-gray-300 text-sm font-semibold text-gray-700">Batal</a>
          <button type="submit" class="px-5 py-2.5 rounded-xl bg-[#1a3a6b] text-white text-sm font-bold hover:bg-[#2d5da6] transition-colors shadow-sm">Ajukan Cuti</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
