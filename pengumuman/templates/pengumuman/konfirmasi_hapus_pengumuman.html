{% extends 'base.html' %}
{% load static %}
{% block page_title %}Hapus Pengumuman{% endblock %}

{% block content %}
<div class="card p-8 max-w-lg mx-auto text-center mt-12 border-t-4 border-red-500">
    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-triangle-exclamation text-2xl text-red-600"></i>
    </div>
    <h2 class="text-2xl font-bold text-gray-900 mb-2">Hapus Pengumuman?</h2>
    <p class="text-gray-500 mb-6 text-sm">
        Apakah Anda yakin ingin menghapus pengumuman <strong>"{{ pengumuman.judul }}"</strong>? Tindakan ini tidak dapat dibatalkan.
    </p>

    <form method="post" class="flex items-center justify-center gap-4">
        {% csrf_token %}
        <a href="{% url 'pengumuman:daftar' %}" class="btn bg-gray-100 text-gray-700 hover:bg-gray-200 px-6 py-2.5 rounded-xl font-bold text-sm transition">
            Batal
        </a>
        <button type="submit" class="btn bg-red-600 text-white hover:bg-red-700 px-6 py-2.5 rounded-xl font-bold text-sm shadow-md shadow-red-600/20 flex items-center gap-2 transition">
            <i class="fa-solid fa-trash-can"></i> Ya, Hapus
        </button>
    </form>
</div>
{% endblock %}
