{% extends "base.html" %}

{% block content %}
<style>
    .form-card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); border: 1px solid var(--border); overflow: hidden; }
    .form-header { background: linear-gradient(135deg, var(--primary), var(--primary-light)); padding: 24px; color: white; }
    .form-body { padding: 32px 24px; }
    .form-section-title { font-size: 14px; text-transform: uppercase; color: var(--primary); font-weight: 700; margin: 24px 0 16px; border-bottom: 2px solid #F1F5F9; padding-bottom: 8px; }
    .input-control { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-md); background: #F8FAFC; }
    .personel-row { display: flex; gap: 10px; margin-bottom: 10px; }
</style>

<div class="form-card">
    <div class="form-header">
        <h2 style="color: white; margin: 0;"><i class="fa-solid fa-file-circle-plus"></i> Penerbitan Sprin Otomatis</h2>
    </div>

    <form method="POST" class="form-body">
        {% csrf_token %}
        
        <div class="form-section-title" style="margin-top: 0;">Data Operasi</div>
        <div class="mb-4">
            <label class="info-label">Nama Kegiatan</label>
            <input type="text" name="operation_name" class="input-control" required>
        </div>
        <div class="mb-4">
            <label class="info-label">Deskripsi</label>
            <textarea name="description" class="input-control" rows="2"></textarea>
        </div>

        <div class="form-section-title">Lokasi</div>
        <div class="mb-4">
            <label class="info-label">Nama Lokasi</label>
            <input type="text" name="location_name" class="input-control" placeholder="Contoh: Pos Pantau Tol" required>
        </div>
        {% comment %} <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
            <div>
                <label class="info-label">Latitude</label>
                <input type="number" name="latitude" step="any" class="input-control" required>
            </div>
            <div>
                <label class="info-label">Longitude</label>
                <input type="number" name="longitude" step="any" class="input-control" required>
            </div>
            <div>
                <label class="info-label">Radius (M)</label>
                <input type="number" name="radius_meter" value="100" class="input-control">
            </div>
        </div> {% endcomment %}

        <div class="form-section-title">Waktu & Otoritas</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;" class="mb-4">
            <div>
                <label class="info-label">Waktu Mulai</label>
                <input type="datetime-local" name="start_date" class="input-control" required>
            </div>
            <div>
                <label class="info-label">Waktu Selesai</label>
                <input type="datetime-local" name="end_date" class="input-control" required>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label class="info-label">Dibuat Oleh</label>
                <select name="created_by" class="input-control" required>
                    <option value="">-- Pilih Staf --</option>
                    {% for p in personel_all %}<option value="{{ p.id }}">{{ p.nama }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <label class="info-label">Pimpinan Penandatangan</label>
                <select name="approved_by" class="input-control" required>
                    <option value="">-- Pilih Pimpinan --</option>
                    {% for p in personel_all %}<option value="{{ p.id }}">{{ p.nama }}</option>{% endfor %}
                </select>
            </div>
        </div>

        <div class="form-section-title">Personel Terlibat</div>
        <div id="personel-container">
            <div class="personel-row">
                <select name="personel_ids[]" class="input-control personel-select">
                    <option value="">-- Pilih Personel --</option>
                    {% for p in personel_all %}<option value="{{ p.id }}">{{ p.nama }}</option>{% endfor %}
                </select>
                <button type="button" onclick="tambahBaris()" class="btn btn-primary">+</button>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 30px; padding: 15px;">Terbitkan Surat Perintah</button>
    </form>
</div>

<script>
function tambahBaris() {
    const container = document.getElementById('personel-container');
    const selectedIds = Array.from(document.querySelectorAll('.personel-select')).map(s => s.value).filter(id => id !== "");
    const row = document.querySelector('.personel-row').cloneNode(true);
    const select = row.querySelector('select');
    select.value = "";
    Array.from(select.options).forEach(opt => { if (selectedIds.includes(opt.value)) opt.disabled = true; });
    const btn = row.querySelector('button');
    btn.textContent = "-"; btn.className = "btn btn-danger";
    btn.onclick = function() { this.parentElement.remove(); };
    container.appendChild(row);
}
</script>
{% endblock %}
