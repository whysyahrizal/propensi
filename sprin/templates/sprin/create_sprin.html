{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-6">
        <a href="{% url 'sprin:daftar' %}" class="inline-flex items-center gap-2 text-sm font-medium text-gray-600 hover:text-[#1a3a6b] transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Kembali ke Daftar
        </a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="bg-gradient-to-br from-[#1a3a6b] to-[#2d5da6] p-6 text-white">
            <h2 class="text-xl font-bold m-0 flex items-center gap-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Penerbitan Sprin Otomatis
            </h2>
        </div>

        <form method="POST" class="p-6 md:p-8">
            {% csrf_token %}
            
            <h3 class="text-xs font-bold uppercase tracking-wider text-[#1a3a6b] border-b-2 border-gray-100 pb-2 mb-4">Data Operasi</h3>
            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nama Kegiatan</label>
                <input type="text" name="operation_name" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-[#1a3a6b] focus:border-[#1a3a6b] transition-colors" required>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Deskripsi</label>
                <textarea name="description" rows="3" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-[#1a3a6b] focus:border-[#1a3a6b] transition-colors"></textarea>
            </div>

            <h3 class="text-xs font-bold uppercase tracking-wider text-[#1a3a6b] border-b-2 border-gray-100 pb-2 mb-4 mt-8">Lokasi</h3>
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Lokasi Penugasan</label>
                <select name="location_id" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-[#1a3a6b] focus:border-[#1a3a6b] transition-colors">
                    <option value="">-- Pilih Lokasi Aktif --</option>
                    {% for location in active_locations %}
                    <option value="{{ location.id }}" {% if selected_location_id|stringformat:"s" == location.id|stringformat:"s" %}selected{% endif %}>
                        {{ location.name }} ({{ location.get_type_display }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <h3 class="text-xs font-bold uppercase tracking-wider text-[#1a3a6b] border-b-2 border-gray-100 pb-2 mb-4 mt-8">Waktu & Otoritas</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Waktu Mulai</label>
                    <input type="datetime-local" name="start_date" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-[#1a3a6b] focus:border-[#1a3a6b] transition-colors" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Waktu Selesai</label>
                    <input type="datetime-local" name="end_date" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-[#1a3a6b] focus:border-[#1a3a6b] transition-colors" required>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Dibuat Oleh</label>
                    <select name="created_by" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-[#1a3a6b] focus:border-[#1a3a6b] transition-colors" required>
                        <option value="">-- Pilih Staf --</option>
                        {% for p in personel_staff %}<option value="{{ p.id }}">{{ p.pangkat }} {{ p.nama_lengkap }} ({{ p.nrp }})</option>{% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Pimpinan Penandatangan</label>
                    <select name="approved_by" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-[#1a3a6b] focus:border-[#1a3a6b] transition-colors" required>
                        <option value="">-- Pilih Pimpinan --</option>
                        {% for p in personel_pimpinan %}<option value="{{ p.id }}">{{ p.pangkat }} {{ p.nama_lengkap }} ({{ p.nrp }})</option>{% endfor %}
                    </select>
                </div>
            </div>

            <h3 class="text-xs font-bold uppercase tracking-wider text-[#1a3a6b] border-b-2 border-gray-100 pb-2 mb-4 mt-8">Personel Terlibat</h3>
            <div id="personel-container" class="space-y-3 mb-8">
                <div class="personel-row flex items-center gap-3">
                    <select name="personel_ids[]" class="personel-select flex-1 px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-[#1a3a6b] focus:border-[#1a3a6b] transition-colors">
                        <option value="">-- Pilih Personel --</option>
                        {% for p in personel_terlibat %}<option value="{{ p.id }}">{{ p.pangkat }} {{ p.nama_lengkap }} ({{ p.nrp }})</option>{% endfor %}
                    </select>
                    <button type="button" onclick="tambahBaris()" class="shrink-0 w-11 h-11 flex items-center justify-center bg-indigo-100 text-indigo-700 rounded-lg hover:bg-indigo-200 transition-colors" title="Tambah Personel">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full py-3.5 px-4 bg-[#1a3a6b] text-white font-bold text-sm rounded-xl hover:bg-[#2d5da6] transition-colors shadow-sm">
                Terbitkan Surat Perintah
            </button>
        </form>
    </div>
</div>

<script>
function tambahBaris() {
    const container = document.getElementById('personel-container');
    const selectedIds = Array.from(document.querySelectorAll('.personel-select')).map(s => s.value).filter(id => id !== "");
    const row = document.querySelector('.personel-row').cloneNode(true);
    
    const select = row.querySelector('select');
    select.value = "";
    
    // Disable already selected options
    Array.from(select.options).forEach(opt => { 
        if (selectedIds.includes(opt.value)) {
            opt.disabled = true; 
        }
    });
    
    const btn = row.querySelector('button');
    btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/></svg>';
    btn.className = "shrink-0 w-11 h-11 flex items-center justify-center bg-red-100 text-red-700 rounded-lg hover:bg-red-200 transition-colors";
    btn.title = "Hapus Personel";
    btn.onclick = function() { this.parentElement.remove(); };
    
    container.appendChild(row);
}
</script>
{% endblock %}
